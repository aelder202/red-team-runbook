site_name: Red Team Runbook
site_description: A practitioner's reference for offensive security operations — built from real engagements and lab work.
site_author: aelder202
site_url: https://taylorelder.com/red-team-runbook/
repo_url: https://github.com/aelder202/red-team-runbook
repo_name: aelder202/red-team-runbook

theme:
  name: material
  palette:
    scheme: slate
    primary: red
    accent: deep orange
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Information Gathering:
    - Overview: information-gathering/index.md
    - Service Analysis:
      - DNS (53): information-gathering/service-analysis/dns-53.md
      - FTP (21): information-gathering/service-analysis/ftp-21.md
      - IMAP (143, 993): information-gathering/service-analysis/imap.md
      - IPMI (623): information-gathering/service-analysis/ipmi-623.md
      - IKE/ISAKMP (500, 4500): information-gathering/service-analysis/isakmp-ike.md
      - Kerberos (88): information-gathering/service-analysis/kerberos-88.md
      - LDAP (389, 636): information-gathering/service-analysis/ldap.md
      - MSSQL (1433): information-gathering/service-analysis/mssql-1433.md
      - MySQL (3306): information-gathering/service-analysis/mysql-3306.md
      - NFS (2049): information-gathering/service-analysis/nfs-2049.md
      - Oracle TNS (1521): information-gathering/service-analysis/oracle-tns-1521.md
      - POP3 (110, 995): information-gathering/service-analysis/pop3.md
      - R-Services (512-514): information-gathering/service-analysis/r-services.md
      - RDP (3389): information-gathering/service-analysis/rdp-3389.md
      - Rsync (873): information-gathering/service-analysis/rsync-873.md
      - SMB (139, 445): information-gathering/service-analysis/smb.md
      - SMTP (25, 465, 587): information-gathering/service-analysis/smtp.md
      - SNMP (161, 162): information-gathering/service-analysis/snmp.md
      - SNMP Multiplexer (199): information-gathering/service-analysis/snmp-multiplexer.md
      - SSH (22): information-gathering/service-analysis/ssh-22.md
      - TFTP (69): information-gathering/service-analysis/tftp-69.md
      - WinRM (5985, 5986): information-gathering/service-analysis/winrm.md
