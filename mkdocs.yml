site_name: Red Team Runbook
site_description: A practitioner's reference for offensive security operations — built from real engagements and lab work.
site_author: aelder202
site_url: https://taylorelder.com/red-team-runbook/
repo_url: https://github.com/aelder202/red-team-runbook
repo_name: aelder202/red-team-runbook

theme:
  name: material
  palette:
    scheme: slate
    primary: red
    accent: deep orange
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Recon:
    - Overview: network-scanning/index.md
    - Network Scanning: network-scanning/network-scanning.md
    - Reconnaissance: network-scanning/reconnaissance.md
    - Traffic Capture: network-scanning/traffic-capture.md
    - EyeWitness: applications/tools/eyewitness.md
  - Services:
